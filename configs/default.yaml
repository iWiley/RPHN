# Example workspace config: train on A, validate on B, test on C/E/D.
seed: 1344107968
deterministic: false
output_dir: "results/xt1"
eval_test_every: 0
eval_test_each_epoch: false
save_epoch_predictions: true
epochs: 50
early_stop_patience: 5
save_epoch_checkpoint_start: 50
save_epoch_checkpoint_end: 50
batch_size: 128
lr: 1e-4
dropout: 0.1
weight_decay: 0.02
warmup_epochs: 12
warmup_start_factor: 0.2
  
wsi_anchors_path: "assets/anchors/anchors_wsi.pth"
wsi_anchor_momentum: 0.99

cca_weight: 0.1
intra_decor_weight: 0.02
aux_weight: 1.0
os_loss_weight: 1.0
rfs_loss_weight: 2.0

loader:
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 4
  cache_mode: "none"
  use_threaded_loader: false

train:
  data_h5: "data/A/data.h5"
  surv_csv: "data/A/surv.csv"

val:
  data_h5: "data/B/data.h5"
  surv_csv: "data/B/surv.csv"

test:
  - name: "C"
    data_h5: "data/C/data.h5"
    surv_csv: "data/C/surv.csv"
  - name: "E"
    data_h5: "data/E/data.h5"
    surv_csv: "data/E/surv.csv"
  - name: "D"
    data_h5: "data/D/data.h5"
    surv_csv: "data/D/surv.csv"
